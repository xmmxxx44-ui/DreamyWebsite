<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamyVR — A virtual reality experience.</title>
  <meta name="description" content="DreamyVR — A multiplayer game platform." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🎮</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060d1a;
      --bg-card: rgba(10,20,45,0.7);
      --border: rgba(59,143,245,0.1);
      --border-hover: rgba(59,143,245,0.2);
      --text: #ddeeff;
      --text-sub: rgba(200,225,255,0.55);
      --text-muted: rgba(200,225,255,0.28);
      --accent: #3b8ff5;
      --accent-glow: rgba(59,143,245,0.12);
      --accent-strong: #6aaeff;
      --green: #38bdf8;
      --font: 'Nunito', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      min-height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow-x: hidden; position: relative;
    }

    /* ─── Ambient layers ─────────────── */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* Radial glow behind center content */
    .glow-orb {
      position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(29,111,232,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: orb-breathe 6s ease-in-out infinite;
    }
    @keyframes orb-breathe {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.08); }
    }

    /* Floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--accent); opacity: 0;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      10% { opacity: 0.4; }
      90% { opacity: 0.1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1); }
    }

    /* ─── Content ─────────────────────── */
    .page {
      position: relative; z-index: 1; width: 100%;
      max-width: 520px; padding: 40px 24px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 0;
    }

    .page-nav {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .page-button {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .page-button:hover {
      color: var(--text-sub);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .brand {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .brand-icon {
      width: 380px; max-width: 90vw; height: auto;
      object-fit: contain; border-radius: 0;
    }
    .brand-name {
      font-weight: 800; font-size: 28px; letter-spacing: -0.5px;
    }
    .brand-dot { color: var(--accent); }
    /* Hero text */
    h1 {
      font-size: 46px; font-weight: 900; letter-spacing: -1.5px;
      line-height: 1.08; margin-bottom: 16px;
      opacity: 0; animation: fade-up 0.7s ease forwards 0.2s;
    }
    h1 .accent {
      background: linear-gradient(135deg, var(--accent-strong), #1252b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 16px; line-height: 1.6; color: var(--text-sub);
      max-width: 400px; margin-bottom: 0; font-weight: 400;
      opacity: 0; animation: fade-up 0.7s ease forwards 0.3s;
    }

    /* Footer */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px; text-align: center;
      font-size: 12px; color: var(--text-muted); z-index: 1;
      opacity: 0; animation: fade-in 0.8s ease forwards 0.6s;
    }
    .footer a { color: var(--text-sub); text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: var(--accent); }

    /* Animations */
    @keyframes fade-in {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="particles" id="particles"></div>

  <div class="page">
    <!-- Logo -->
    <div class="brand" style="margin-bottom: 24px; margin-right: 170px; opacity:0; animation: fade-up 0.7s ease forwards 0.1s;">
      <img class="brand-icon" src="logo.png" alt="DreamyVR" />
    </div>

    <div class="brand" style="margin-bottom: 6px; margin-right: 1px; opacity:0; animation: fade-up 0.7s ease forwards 0.1s;">
      <img class="brand-icon" src="otherlogoo.png" alt="DreamyVR" style="width: 220px; max-width: 70vw;" />
    </div>
    <p class="subtitle">
      DreamyVR is a multiplayer game built on the Unity platform. DreamyVR is still under testing and will be released to the official Meta Store!
    </p>
  </div>

    <div class="page-nav">
      <a class="page-button muted" href="">Meta Store</a>
      <a class="page-button muted" href="https://discord.gg/Cmbcdqh6S9">Discord</a>
      <a class="page-button muted" href="">TikTok</a>
    </div>

  </div>
  <p style="margin-top: 100px; font-size: 12px; color: var(--text-muted);"> Game coming soon! · Join the Discord for updates</p>

  <script>
    // ─── Particles ──────────────────────────
    (function initParticles() {
      const container = document.getElementById("particles");
      const count = 18;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const size = Math.random() * 2.5 + 1;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * 100 + "%";
        p.style.bottom = "-10px";
        p.style.animationDuration = (Math.random() * 12 + 10) + "s";
        p.style.animationDelay = (Math.random() * 15) + "s";
        container.appendChild(p);
      }
    })();
    
  </script>

</body>
</html>
